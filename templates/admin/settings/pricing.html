{% extends "admin/layout.html" %}
{% set title='Pricing' %}
{% block admin_body %}<header class="page-header"><div><p class="eyebrow">Settings</p><h1>Pricing</h1><p>Control rental pricing, currency display and default security deposits.</p></div></header>{% include "admin/settings/nav.html" %}<form method="post" class="settings-form panel"><div class="form-grid"><label class="switch"><input type="checkbox" name="pricing_enabled" value="1" {% if settings.pricing_enabled %}checked{% endif %}> Enable pricing</label><label>Currency<input name="currency" value="{{ settings.currency }}"></label><label>Symbol<input name="currency_symbol" value="{{ settings.currency_symbol }}"></label><label>Currency position<select name="currency_position"><option value="before" {% if settings.currency_position=='before' %}selected{% endif %}>Before amount</option><option value="after" {% if settings.currency_position=='after' %}selected{% endif %}>After amount</option></select></label><label>Default deposit mode<select name="deposit_mode"><option value="none">No deposit</option><option value="percentage">Percentage of order total</option><option value="product_specific" selected>Product-specific deposits</option><option value="fixed">Fixed amount</option></select></label><label>Deposit value<input name="deposit_value" type="number" step="0.01" value="{{ settings.deposit_value }}"></label></div><input type="hidden" name="company_name" value="{{ settings.company_name }}"><input type="hidden" name="email" value="{{ settings.email }}"><input type="hidden" name="tax_mode" value="{{ settings.tax_mode }}"><input type="hidden" name="default_pickup_time" value="{{ settings.default_pickup_time }}"><input type="hidden" name="default_return_time" value="{{ settings.default_return_time }}"><input type="hidden" name="time_increment_minutes" value="{{ settings.time_increment_minutes }}"><button class="btn primary">Save</button></form>{% endblock %}
