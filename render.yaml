services:
  - type: web
    name: abi-rental-platform
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@abi.local
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/abi_rental.db
    disk:
      name: abi-rental-data
      mountPath: /var/data
      sizeGB: 1
